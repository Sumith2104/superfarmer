{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>🧑🌾 Step 1: Farm Profile Setup</h2>
    <p>Our Intake Agent needs some basic details about your farm.</p>

    <form method="POST">
        <div class="form-group">
            <label for="name">Farmer Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="land_size">Land Size (Acres)</label>
            <input type="number" step="0.1" id="land_size" name="land_size" required placeholder="5.5">
        </div>
        <div class="form-group">
            <label for="location">Location / Region</label>
            <input type="text" id="location" name="location" required placeholder="Indore, MP">
        </div>
        <div class="form-group">
            <label for="water">Water Availability</label>
            <select id="water" name="water">
                <option value="High">High (Canal/River)</option>
                <option value="Medium">Medium (Borewell)</option>
                <option value="Low">Low (Rainfed)</option>
            </select>
        </div>
        <div class="form-group full-width">
            <label for="goals">Primary Farming Goals</label>
            <textarea id="goals" name="goals" rows="3"
                placeholder="Maximize profit, drought-resistant crop..."></textarea>
        </div>
        <div class="form-group full-width">
            <button type="submit" class="btn">Save Profile & Get Recommendations</button>
        </div>
    </form>
</div>
{% endblock %}
