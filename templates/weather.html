{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>🌤️ Step 6: Weather & Harvest Planner</h2>
    <p>Our Weather Agent connects with real-time forecasting to determine if you should harvest early to avoid crop
        damage.</p>

    <form method="POST">
        <div class="form-group full-width">
            <label for="location">Enter your City / Location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Indore, Delhi, Mumbai" required>
        </div>
        <div class="form-group full-width">
            <button type="submit" class="btn">Analyze 3-Day Forecast</button>
        </div>
    </form>

    {% if analysis %}
    <div class="result-box">
        <h3>Agent Analysis:</h3>
        <p style="white-space: pre-line; font-size: 1.1rem;">{{ analysis }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
