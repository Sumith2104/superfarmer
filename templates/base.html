<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperFarmer - AI Agricultural Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <span>🌿 Super</span>Farmer
        </div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            {% if session.get('user_id') %}
            <a href="{{ url_for('intake') }}">Setup Profile</a>
            <a href="{{ url_for('recommendation') }}">Crops</a>
            <a href="{{ url_for('disease') }}">Disease AI</a>
            <a href="{{ url_for('weather') }}">Weather</a>
            <a href="{{ url_for('nutrient_risk') }}">Nutrient Risk</a>
            <a href="{{ url_for('spatial_planner') }}">Spatial Twin</a>
            <a href="{{ url_for('report') }}">Reports</a>
            <a href="{{ url_for('logout') }}" style="color: #ef4444;">Logout</a>
            {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('signup') }}" class="btn" style="padding: 0.5rem 1rem; margin-left: 1rem;">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
