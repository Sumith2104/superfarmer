{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2 style="text-align: center;">Join SuperFarmer</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Create an account to start managing your crops intelligently</p>

    {% if error %}
    <div
        style="background-color: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-group full-width">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group full-width">
            <label for="password">Password (Make it strong!)</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group full-width" style="margin-top: 1rem;">
            <button type="submit" class="btn" style="width: 100%;">Create Account</button>
        </div>
    </form>

    <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Login
            here</a>
    </p>
</div>
{% endblock %}
